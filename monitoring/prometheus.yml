global:
  scrape_interval: 5s

scrape_configs:

  - job_name: "backend"
    static_configs:
      - targets: ["backend:3001"]

  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]