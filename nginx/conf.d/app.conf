server {
    listen 80;
    server_name grazyna.app www.grazyna.app;

    location / {
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
    }

    location /health {
        proxy_pass http://backend:3001/health;
        proxy_set_header Host $host;
    }
}
# 🔴 HTTP → HTTPS redirect (wymagane do SSL + SEO)
server {
    listen 80;
    server_name grazyna.app www.grazyna.app;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ✅ HTTPS PRO SERVER
server {
    listen 443 ssl http2;
    server_name grazyna.app www.grazyna.app;

    # 🔐 certyfikaty (Certbot)
    ssl_certificate /etc/letsencrypt/live/grazyna.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/grazyna.app/privkey.pem;

    # 🔐 TLS (bezpieczne wersje)
    ssl_protocols TLSv1.2 TLSv1.3;

    # 🔐 wydajność SSL
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 🔒 security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 🔁 reverse proxy do backendu
    location / {
        proxy_pass http://backend:3001;

        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;
    }

    # ❤️ HEALTH CHECK (opcjonalne)
    location /health {
        return 200 "healthy";
        add_header Content-Type text/plain;
    }

    # 📜 logi
    access_log /var/log/nginx/grazyna_access.log;
    error_log /var/log/nginx/grazyna_error.log;
}